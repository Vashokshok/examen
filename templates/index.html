<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Страница категорий</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-primary mb-4">Страница категорий</h1>

        <div class="list-group mb-4">
            {% for category in categor %}
                <div class="list-group-item d-flex justify-content-between align-items-center">
                    <span>{{ category.name }}</span>
                    <span class="badge bg-primary rounded-pill">{{ category.notes|length }}</span>
                </div>
            {% endfor %}
        </div>

        <a href="{{ url_for('category.add_note') }}" class="btn btn-success">
            Добавить заметку
        </a>
    </div>
</body>
</html>
